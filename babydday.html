<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-Day Counter</title>

<!-- Pretendard CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Pretendard', sans-serif;
  text-align:center;
  color:white;
  overflow:hidden;
}

.background {
  position:absolute;
  width:100%;
  height:100%;
  background-image:url(https://i.pinimg.com/1200x/84/e7/83/84e78355a471dab71b7f4931033c9764.jpg);
  background-size:cover;
  background-position:center;
  filter:brightness(0.7);
  z-index:-1;
}

.content {
  backdrop-filter:blur(3px);
  padding:40px 60px;
  border-radius:20px;
}

h1 {
  font-size:28px;
  font-weight:600;
  margin-bottom:20px;
  letter-spacing:-0.5px;
}

.heart {
  font-size:36px;
  margin:15px 0;
  animation:heartbeat 1.5s infinite;
}

@keyframes heartbeat {
  0%{transform:scale(1);}
  14%{transform:scale(1.3);}
  28%{transform:scale(1);}
  42%{transform:scale(1.3);}
  70%{transform:scale(1);}
  100%{transform:scale(1);}
}

#dday {
  font-size:52px;
  font-weight:700;
  letter-spacing:-1px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="content">
  <h1>뿌콩이 is coming soon</h1>
  <div class="heart">🤍</div>
  <div id="dday">Loading...</div>
</div>

<script>
const targetDate = new Date("2026-11-06T00:00:00+09:00");
const today = new Date();
const gap = targetDate - today;
const days = Math.ceil(gap / (1000 * 60 * 60 * 24));

if(days >= 0){
  document.getElementById("dday").innerText = "D-" + days;
}else{
  document.getElementById("dday").innerText = "D+" + Math.abs(days);
}
</script>

</body>
</html>
