<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아기 D-day</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .phone {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 9/16;
    border-radius: 32px;
    overflow: hidden;
    color: #fff;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(5px) brightness(0.75);
    transform: scale(1.1);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 24px;
  }
  .title {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.3;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .heart { font-size: 36px; margin: 28px 0; }
  .dday {
    font-size: 52px;
    font-weight: 600;
    text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="bg" id="bg"></div>
    <div class="content">
      <div class="title"><span id="name">뿌콩이</span> is coming<br/>soon</div>
      <div class="heart">🤍</div>
      <div class="dday" id="dday">D-???</div>
    </div>
  </div>
 
<script>
  // URL의 ? 뒤에서 값을 읽어옵니다
  const params = new URLSearchParams(window.location.search);
 
  // 값이 없으면 기본값 사용
  const name    = params.get('name') || '뿌콩이';
  const dateStr = params.get('date') || '2026-11-06';
  const img     = params.get('img')  || 'https://i.pinimg.com/736x/4a/e0/a7/4ae0a792023a68c9afca89c4005da7d3.jpg';
 
  // 화면에 반영
  document.getElementById('name').textContent = name;
  document.getElementById('bg').style.backgroundImage = `url("${img}")`;
 
  // D-day 자동 계산
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr);
  const diff = Math.ceil((target - today) / 86400000);
  document.getElementById('dday').textContent =
    diff > 0 ? `D-${diff}` : diff === 0 ? 'D-DAY' : `D+${Math.abs(diff)}`;
</script>
</body>
</html>
